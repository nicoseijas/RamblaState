name: Release to NuGet

# Publishes packages when a version tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# The package version is taken from the tag (v0.1.0 -> 0.1.0).
#
# Requires a repository secret NUGET_API_KEY:
#   Settings > Secrets and variables > Actions > New repository secret
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to pack/push (without leading v), e.g. 0.1.0"
        required: true

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET (pinned by global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: >
          dotnet pack Rambla.slnx --configuration Release
          -p:Version=${{ steps.ver.outputs.value }}
          -p:ContinuousIntegrationBuild=true
          -o ${{ github.workspace }}/artifacts

      # Push the core first (Rambla.Wpf depends on it), then the rest.
      # --skip-duplicate makes re-runs safe. snupkg symbol packages push alongside.
      - name: Push to NuGet
        shell: bash
        run: |
          dotnet nuget push "artifacts/Rambla.${{ steps.ver.outputs.value }}.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "artifacts/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload packages as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*
