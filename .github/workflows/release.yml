name: Release to NuGet

# Publishes packages when a version tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# The package version is taken from the tag (v0.1.0 -> 0.1.0).
#
# Auth: NuGet Trusted Publishing (OIDC) — no long-lived API key.
# One-time setup on nuget.org (your username > Trusted Publishing > add policy):
#   Repository Owner : nicoseijas
#   Repository       : RamblaState
#   Workflow File    : release.yml          (file name only, no path)
#   Environment      : (leave empty)
# And add a repo secret NUGET_USER = your nuget.org profile name (not your email).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to pack/push (without leading v), e.g. 0.1.0"
        required: true

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      id-token: write   # required for GitHub to issue the OIDC token
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET (pinned by global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # A tag must never publish broken or unformatted code: the release gate
      # is the same restore/format/build/test sequence CI runs.
      - name: Restore
        run: dotnet restore Rambla.slnx

      - name: Verify formatting
        run: dotnet format Rambla.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build Rambla.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Rambla.slnx --configuration Release --no-build --verbosity normal

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: >
          dotnet pack Rambla.slnx --configuration Release
          -p:Version=${{ steps.ver.outputs.value }}
          -p:ContinuousIntegrationBuild=true
          -o ${{ github.workspace }}/artifacts

      # Exchange the OIDC token for a short-lived (1 h) NuGet API key.
      # Requested right before the push so it cannot expire in between.
      - name: NuGet login (OIDC → temporary API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      # Push the core first (Rambla.Wpf depends on it). Push each package by its
      # explicit path — a "*.nupkg" glob is NOT expanded by dotnet on Windows.
      # dotnet auto-pushes the matching .snupkg alongside each .nupkg.
      # --skip-duplicate keeps re-runs safe when a version already exists.
      - name: Push to NuGet
        shell: bash
        env:
          V: ${{ steps.ver.outputs.value }}
          KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: |
          for pkg in "Rambla" "Rambla.Diagnostics" "Rambla.Wpf"; do
            dotnet nuget push "artifacts/${pkg}.${V}.nupkg" \
              --api-key "$KEY" \
              --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Upload packages as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*
