name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    # WPF (net10.0-windows) is part of the solution, so the build must run on Windows.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET (pinned by global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Rambla.slnx

      # dotnet format evaluates the workspace in the default (Debug) configuration,
      # and the [State] generator is an analyzer ProjectReference — its DLL must
      # exist or every generated member comes up missing (CS0535).
      - name: Build generators (needed by dotnet format)
        run: dotnet build src/Rambla.Generators/Rambla.Generators.csproj --no-restore

      - name: Verify formatting
        run: dotnet format Rambla.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build Rambla.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Rambla.slnx --configuration Release --no-build --verbosity normal
